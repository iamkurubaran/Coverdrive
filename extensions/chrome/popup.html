<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Coverdrive</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="sky" aria-hidden="true">
      <span class="floodlight fl-a"></span>
      <span class="floodlight fl-b"></span>
    </div>

    <header class="topbar">
      <span class="brand">
        <svg class="ball-mark" viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="26" fill="#c8102e" />
          <path d="M23 8 Q16 32 23 56" fill="none" stroke="#f6e7c8" stroke-width="2.5" stroke-dasharray="4 3" />
          <path d="M41 8 Q48 32 41 56" fill="none" stroke="#f6e7c8" stroke-width="2.5" stroke-dasharray="4 3" />
        </svg>
        <span class="brand-name">COVER<em>DRIVE</em></span>
      </span>
      <span class="live-counter" id="counter" hidden>
        <span class="live-dot" aria-hidden="true"></span>
        <strong id="counter-num">0</strong>&nbsp;rated
      </span>
    </header>

    <main>
      <!-- Search view -->
      <section id="view-search">
        <div class="hero-eyebrow">
          <span>GITHUB</span>
          <span class="eyebrow-x">×</span>
          <span class="eyebrow-gold">WORLD XI ’26</span>
        </div>
        <h1 class="hero-title">GET SELECTED<span class="full-stop">.</span></h1>

        <form class="search" id="search-form">
          <div class="search-field">
            <span class="at" aria-hidden="true">@</span>
            <input
              id="username"
              placeholder="github username"
              spellcheck="false"
              autocomplete="off"
              autocapitalize="none"
              aria-label="GitHub username"
            />
          </div>
          <button class="scout-btn" id="scout-btn" type="submit">SCOUT</button>
        </form>

        <button class="tab-chip" id="tab-chip" hidden></button>

        <div class="suggested" id="suggested">
          <span>try</span>
        </div>

        <p class="error" id="error" role="alert" hidden></p>

        <div class="empty" id="empty">
          <div class="pitch" aria-hidden="true">
            <span class="crease c1"></span>
            <span class="crease c2"></span>
            <span class="stumps"><i></i><i></i><i></i></span>
          </div>
          <p>Step up to the crease — enter a username to get rated.</p>
        </div>

        <div class="umpire" id="umpire" hidden>
          <span class="umpire-bails" aria-hidden="true"></span>
          Third umpire reviewing…
        </div>
      </section>

      <!-- Card view -->
      <section id="view-card" hidden>
        <button class="back-link" id="back-btn">← scout another</button>
        <div id="card-mount"></div>
        <div class="trait" id="trait" hidden>
          <span class="trait-tag" id="trait-tag"></span>
          <p class="trait-note" id="trait-note"></p>
        </div>
        <div class="report-actions">
          <a class="report-btn" id="report-link" target="_blank" rel="noreferrer">
            FULL SCOUTING REPORT ↗
          </a>
          <button class="copy-btn" id="copy-btn">COPY LINK</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span class="footer-stripe" aria-hidden="true"></span>
      <p>Unofficial &amp; just for fun — not affiliated with the ICC or GitHub.</p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
